<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noun Quiz: Countable vs Uncountable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f7ff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .btn-option {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-option:active {
            transform: scale(0.95);
        }

        .feedback-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        select, input {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 16px;
            outline: none;
            transition: all 0.2s;
            background: white;
        }

        select:focus, input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .hidden-section {
            display: none;
        }

        .word-display-box {
            background: #eff6ff;
            border: 3px dashed #3b82f6;
            border-radius: 24px;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl glass-card p-6 md:p-10 relative overflow-hidden">
        <!-- Progress Bar -->
        <div id="progress-container" class="hidden mb-8">
            <div class="flex justify-between text-sm font-bold text-blue-600 mb-2 uppercase tracking-wider">
                <span id="section-title">Section 1</span>
                <span>Question <span id="current-q-num">1</span>/15</span>
            </div>
            <div class="w-full bg-blue-100 h-3 rounded-full">
                <div id="progress-bar" class="bg-blue-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="text-center py-10">
            <h1 class="text-5xl font-extrabold text-blue-800 mb-6">Noun Adventure</h1>
            <p class="text-lg text-gray-600 mb-10">Master Countable and Uncountable nouns with fun exercises!</p>
            
            <div class="bg-blue-50 p-6 rounded-2xl mb-10 text-left border border-blue-100">
                <h3 class="font-bold text-blue-800 mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z"/></svg>
                    How to play:
                </h3>
                <ul class="space-y-2 text-gray-700">
                    <li class="flex items-start"><span class="font-bold mr-2">1.</span> Identify the type of each noun.</li>
                    <li class="flex items-start"><span class="font-bold mr-2">2.</span> Choose the correct grammar structures.</li>
                    <li class="flex items-start"><span class="font-bold mr-2">3.</span> Type the full sentence from scratch.</li>
                </ul>
            </div>

            <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full text-2xl shadow-xl transition-all transform hover:scale-105 hover:-translate-y-1">
                Start Learning
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden-section">
            <div id="question-container" class="min-h-[350px] flex flex-col items-center justify-center text-center">
                <!-- Content will be injected here -->
            </div>

            <!-- Feedback Area -->
            <div id="feedback-area" class="mt-8 min-h-[100px] flex flex-col items-center justify-center">
                <div id="feedback-message" class="text-2xl font-bold hidden mb-4 text-center"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-10 rounded-xl shadow-lg transition-all transform hover:scale-105">
                    Next Question →
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden-section text-center py-10">
            <h2 class="text-4xl font-extrabold text-blue-800 mb-4">Quiz Finished!</h2>
            <div class="text-7xl mb-6">🎉</div>
            <div class="text-3xl font-bold mb-4">Your Score: <span id="final-score" class="text-blue-600">0</span>/15</div>
            <p id="stat-text" class="text-xl text-gray-600 mb-10 px-10"></p>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full shadow-xl transition-all">
                Play Again
            </button>
        </div>
    </div>

    <script>
        const DATA = {
            singular: [
                { word: 'plate', type: 'countable', plural: false },
                { word: 'sandwich', type: 'countable', plural: false },
                { word: 'egg', type: 'countable', plural: false },
                { word: 'bike', type: 'countable', plural: false },
                { word: 'watch', type: 'countable', plural: false },
                { word: 'orange', type: 'countable', plural: false },
                { word: 'tomato', type: 'countable', plural: false },
                { word: 'ant', type: 'countable', plural: false },
                { word: 'car', type: 'countable', plural: false },
                { word: 'book', type: 'countable', plural: false },
                { word: 'teacher', type: 'countable', plural: false },
                { word: 'apple', type: 'countable', plural: false }
            ],
            plural: [
                { word: 'biscuits', type: 'countable', plural: true },
                { word: 'bottles', type: 'countable', plural: true },
                { word: 'cakes', type: 'countable', plural: true },
                { word: 'grapes', type: 'countable', plural: true },
                { word: 'potatoes', type: 'countable', plural: true },
                { word: 'sweets', type: 'countable', plural: true },
                { word: 'watches', type: 'countable', plural: true },
                { word: 'houses', type: 'countable', plural: true },
                { word: 'babies', type: 'countable', plural: true },
                { word: 'strawberries', type: 'countable', plural: true }
            ],
            uncountable: [
                { word: 'bread', type: 'uncountable', plural: false },
                { word: 'butter', type: 'uncountable', plural: false },
                { word: 'cheese', type: 'uncountable', plural: false },
                { word: 'chocolate', type: 'uncountable', plural: false },
                { word: 'coffee', type: 'uncountable', plural: false },
                { word: 'cream', type: 'uncountable', plural: false },
                { word: 'lemonade', type: 'uncountable', plural: false },
                { word: 'meat', type: 'uncountable', plural: false },
                { word: 'pasta', type: 'uncountable', plural: false },
                { word: 'sauce', type: 'uncountable', plural: false },
                { word: 'soup', type: 'uncountable', plural: false },
                { word: 'tea', type: 'uncountable', plural: false },
                { word: 'water', type: 'uncountable', plural: false },
                { word: 'yoghurt', type: 'uncountable', plural: false }
            ]
        };

        const PRAISES = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        
        let selectedWords = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let attempts = 0;
        let synth = window.speechSynthesis;

        function getRandomItems(arr, n) {
            return [...arr].sort(() => 0.5 - Math.random()).slice(0, n);
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.7; // Slightly slower for clarity
            let voices = synth.getVoices();
            let femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Zira'));
            if (femaleVoice) utterance.voice = femaleVoice;
            synth.speak(utterance);
        }

        function startQuiz() {
            // Select random words for the quiz session
            const group1 = getRandomItems(DATA.singular, 5);
            const group2 = getRandomItems(DATA.plural, 5);
            const group3 = getRandomItems(DATA.uncountable, 5);
            
            // Pool them and shuffle
            selectedWords = [...group1, ...group2, ...group3].sort(() => 0.5 - Math.random());

            document.getElementById('start-screen').classList.add('hidden-section');
            document.getElementById('quiz-screen').classList.remove('hidden-section');
            document.getElementById('progress-container').classList.remove('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            const feedback = document.getElementById('feedback-message');
            const nextBtn = document.getElementById('next-btn');
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
            attempts = 0;
            
            let item = selectedWords[currentQuestionIndex];
            let sectionNum = Math.floor(currentQuestionIndex / 5) + 1;
            
            document.getElementById('section-title').innerText = `Section ${sectionNum}`;
            document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / 15) * 100}%`;

            if (sectionNum === 1) renderSection1(item);
            else if (sectionNum === 2) renderSection2(item);
            else renderSection3(item);
        }

        function renderSection1(item) {
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="word-display-box flex flex-col items-center justify-center">
                    <h2 class="text-5xl font-extrabold capitalize text-blue-800 tracking-tight mb-6">${item.word}</h2>
                    <button onclick="speak('${item.word}')" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700 shadow-md transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        Listen Again
                    </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full px-4">
                    <button onclick="checkAnswer('countable')" class="btn-option bg-white border-2 border-blue-500 text-blue-600 font-bold py-5 rounded-2xl hover:bg-blue-600 hover:text-white shadow-sm text-xl">Countable</button>
                    <button onclick="checkAnswer('uncountable')" class="btn-option bg-white border-2 border-blue-500 text-blue-600 font-bold py-5 rounded-2xl hover:bg-blue-600 hover:text-white shadow-sm text-xl">Uncountable</button>
                </div>
            `;
            speak(item.word);
        }

        function renderSection2(item) {
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="mb-10 p-8 bg-blue-100 rounded-3xl inline-block border-2 border-blue-200">
                    <h2 class="text-4xl font-extrabold text-blue-800 capitalize">${item.word}</h2>
                </div>
                <div class="text-2xl md:text-3xl font-bold text-gray-800 mb-10 leading-loose flex flex-wrap justify-center items-center gap-3">
                    <span>There</span>
                    <select id="verb-select" class="text-blue-600 font-black border-2 border-blue-300">
                        <option value="">--</option>
                        <option value="'s">'s</option>
                        <option value="are">are</option>
                    </select>
                    <select id="article-select" class="text-blue-600 font-black border-2 border-blue-300">
                        <option value="">--</option>
                        <option value="a">a</option>
                        <option value="an">an</option>
                        <option value="some">some</option>
                    </select>
                    <span class="text-gray-800 underline decoration-blue-500 underline-offset-8">${item.word}</span>.
                </div>
                <button onclick="checkSection2()" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all text-xl">Check Answer</button>
            `;
            speak(item.word);
        }

        function renderSection3(item) {
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="mb-8 p-8 bg-blue-100 rounded-3xl inline-block border-2 border-blue-200">
                    <h2 class="text-4xl font-extrabold text-blue-800 capitalize">${item.word}</h2>
                </div>
                <div class="w-full max-w-lg mx-auto">
                    <input type="text" id="answer-input" placeholder="Type the full sentence..." 
                           class="w-full text-center text-xl md:text-2xl font-bold py-6 border-b-4 border-blue-300 focus:border-blue-600 bg-transparent transition-all"
                           autocomplete="off">
                    <p class="text-sm text-gray-500 mt-6 italic bg-white p-3 rounded-lg shadow-inner">Example: "There's an apple" or "There is some cheese"</p>
                    <button onclick="checkSection3()" class="mt-8 bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 w-full text-xl">Submit Answer</button>
                </div>
            `;
            const input = document.getElementById('answer-input');
            setTimeout(() => input.focus(), 150);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkSection3();
            });
            speak(item.word);
        }

        function getCorrectSentence(item) {
            const isVowel = /^[aeiou]/i.test(item.word);
            let verb = (item.plural) ? "are" : "is";
            let article = "some";
            
            if (item.type === 'countable' && !item.plural) {
                article = isVowel ? "an" : "a";
            }
            if (item.type === 'uncountable') verb = "is";
            
            return `There ${verb} ${article} ${item.word}`;
        }

        function showFeedback(isCorrect) {
            const feedback = document.getElementById('feedback-message');
            const nextBtn = document.getElementById('next-btn');
            const item = selectedWords[currentQuestionIndex];
            
            feedback.classList.remove('hidden');
            feedback.classList.remove('text-green-600', 'text-red-600');
            
            if (isCorrect) {
                const praise = PRAISES[Math.floor(Math.random() * PRAISES.length)];
                feedback.innerText = praise;
                feedback.classList.add('text-green-600', 'feedback-pop');
                nextBtn.classList.remove('hidden');
                score++;
                
                // Speak full correct sentence
                speak(getCorrectSentence(item));
                
                // Disable active inputs
                document.querySelectorAll('.btn-option, select, input, button:not(#next-btn)').forEach(el => el.disabled = true);
            } else {
                attempts++;
                feedback.innerText = "Incorrect! Please try again.";
                feedback.classList.add('text-red-600');
                
                if (attempts >= 3) {
                    feedback.innerHTML = `<span class="text-xs text-gray-400 uppercase block mb-1">Correct Answer:</span> <span class="text-blue-800 text-lg">${getCorrectSentence(item)}</span>`;
                    nextBtn.classList.remove('hidden');
                    document.querySelectorAll('.btn-option, select, input, button:not(#next-btn)').forEach(el => el.disabled = true);
                }
            }
        }

        function checkAnswer(userChoice) {
            let item = selectedWords[currentQuestionIndex];
            showFeedback(userChoice === item.type);
        }

        function checkSection2() {
            let item = selectedWords[currentQuestionIndex];
            let verbSelect = document.getElementById('verb-select').value;
            let articleSelect = document.getElementById('article-select').value;

            const isVowel = /^[aeiou]/i.test(item.word);
            let correctVerb = (item.plural) ? "are" : "'s";
            let correctArticle = (item.type === 'uncountable' || item.plural) ? 'some' : (isVowel ? 'an' : 'a');

            showFeedback(verbSelect === correctVerb && articleSelect === correctArticle);
        }

        function checkSection3() {
            let item = selectedWords[currentQuestionIndex];
            let rawInput = document.getElementById('answer-input').value.toLowerCase().trim();
            if (rawInput.endsWith('.')) rawInput = rawInput.slice(0, -1);
            let input = rawInput.replace(/’/g, "'");

            const isVowel = /^[aeiou]/i.test(item.word);
            let correctVerb = (item.plural) ? "are" : "is";
            let correctArticle = (item.type === 'uncountable' || item.plural) ? 'some' : (isVowel ? 'an' : 'a');
            
            // Generate valid variations
            let variations = [
                `there ${correctVerb} ${correctArticle} ${item.word}`.toLowerCase(),
                `there${correctVerb === 'is' ? "'s" : "'re"} ${correctArticle} ${item.word}`.toLowerCase()
            ];

            showFeedback(variations.includes(input));
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < 15) loadQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden-section');
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden-section');
            document.getElementById('final-score').innerText = score;
            
            let message = "";
            if (score === 15) message = "Perfect! You're a Countable & Uncountable Master!";
            else if (score >= 12) message = "Outstanding! Your English skills are very impressive.";
            else if (score >= 8) message = "Good work! Keep practicing to improve even more.";
            else message = "Never give up! Try again to get a higher score!";
            
            document.getElementById('stat-text').innerText = message;
        }

        // Initialize voices on load
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>
</html>
