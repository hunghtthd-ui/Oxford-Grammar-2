<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Sentence Scramble Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f8;
        }
        .word-box {
            transition: all 0.2s ease;
        }
        .word-box:hover {
            transform: translateY(-2px);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-anim {
            animation: celebrate 0.5s ease-out;
        }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden p-6 md:p-10">
        <!-- Progress Bar -->
        <div class="mb-8">
            <div class="flex justify-between text-sm font-medium text-slate-500 mb-2">
                <span id="progress-text">Question 1 of 15</span>
                <span id="score-text">Score: 0</span>
            </div>
            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Section -->
        <div id="quiz-content">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold text-slate-800 mb-4">Rearrange the words to make a correct sentence:</h2>
                
                <!-- Scrambled Words -->
                <div id="word-pool" class="flex flex-wrap justify-center gap-2 mb-8">
                    <!-- Words generated by JS -->
                </div>

                <!-- Input Area -->
                <div id="input-container" class="flex flex-wrap justify-center gap-2 mb-4">
                    <!-- Empty slots or Input boxes -->
                </div>

                <!-- Hidden feedback msg -->
                <div id="feedback" class="h-8 text-lg font-semibold mb-4 transition-all opacity-0"></div>
                
                <!-- Answer Reveal -->
                <div id="answer-reveal" class="hidden p-4 bg-amber-50 text-amber-700 rounded-xl mb-6 border border-amber-200 text-left">
                    <p class="text-sm font-bold uppercase mb-1">Correct Answer:</p>
                    <p id="correct-answer-text" class="text-lg italic"></p>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button id="btn-listen" class="flex items-center gap-2 bg-indigo-100 text-indigo-700 px-6 py-3 rounded-2xl font-bold hover:bg-indigo-200 transition-colors w-full sm:w-auto justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                    Listen
                </button>
                <button id="btn-check" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all w-full sm:w-auto">
                    Check
                </button>
                <button id="btn-next" class="hidden bg-emerald-600 text-white px-10 py-3 rounded-2xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-all w-full sm:w-auto">
                    Next Question
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center py-10">
            <div class="mb-6">
                <div class="inline-flex items-center justify-center w-24 h-24 bg-yellow-100 text-yellow-500 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-800">Quiz Completed!</h2>
            </div>
            
            <div class="bg-slate-50 rounded-2xl p-6 mb-8 grid grid-cols-2 gap-4">
                <div>
                    <p class="text-slate-500 text-sm uppercase font-bold tracking-wider">Correct</p>
                    <p id="final-correct" class="text-4xl font-bold text-emerald-600">0</p>
                </div>
                <div>
                    <p class="text-slate-500 text-sm uppercase font-bold tracking-wider">Mistakes</p>
                    <p id="final-wrong" class="text-4xl font-bold text-rose-500">0</p>
                </div>
            </div>

            <button onclick="location.reload()" class="bg-slate-800 text-white px-10 py-4 rounded-2xl font-bold hover:bg-slate-900 transition-all w-full shadow-xl">
                Try Again
            </button>
        </div>
    </div>

    <script>
        const sentences = [
            "There is a small park near my house.",
            "There are lots of apples in her garden.",
            "There isn't a supermarket in the city center.",
            "There aren't any buses on this street at night.",
            "There is a cat under the table in the kitchen.",
            "There are some books on the desk in my bedroom.",
            "There isn't a cat in their farm.",
            "There aren't any people in the park in the morning.",
            "There is a restaurant on this street.",
            "There are many flowers in the garden in spring.",
            "There isn't any milk in the fridge.",
            "There aren't any chairs in the room.",
            "There is a new shop near my house.",
            "There are some children in the playground.",
            "There isn't a hospital in his town."
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let attempts = 0;
        let totalCorrect = 0;
        let totalWrong = 0;
        const praiseList = ["Well done!", "Good job!", "Excellent!", "Very good!"];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        const synth = window.speechSynthesis;
        function speak(text, rate = 0.8) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha')));
            if (femaleVoice) utter.voice = femaleVoice;
            utter.lang = 'en-US';
            utter.rate = rate;
            utter.pitch = 1.0;
            synth.speak(utter);
        }

        function initGame() {
            shuffledQuestions = shuffle([...sentences]);
            currentIndex = 0;
            totalCorrect = 0;
            totalWrong = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const sentence = shuffledQuestions[currentIndex];
            const words = sentence.split(' ');
            const scrambled = shuffle([...words]);
            attempts = 0;

            document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} of ${sentences.length}`;
            document.getElementById('score-text').innerText = `Score: ${totalCorrect}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex) / sentences.length) * 100}%`;
            document.getElementById('feedback').className = 'h-8 text-lg font-semibold mb-4 opacity-0 transition-all';
            document.getElementById('answer-reveal').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('quiz-content').classList.remove('shake', 'correct-anim');

            const pool = document.getElementById('word-pool');
            pool.innerHTML = '';
            scrambled.forEach(word => {
                const span = document.createElement('span');
                span.className = 'word-box bg-white border-2 border-slate-200 px-4 py-2 rounded-xl text-slate-700 font-medium shadow-sm cursor-default select-none';
                span.innerText = word;
                pool.appendChild(span);
            });

            const inputContainer = document.getElementById('input-container');
            inputContainer.innerHTML = '';
            words.forEach((_, i) => {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'w-full sm:w-28 border-b-2 border-slate-300 focus:border-blue-500 outline-none text-center py-2 text-lg font-semibold transition-colors bg-transparent';
                input.placeholder = `Word ${i + 1}`;
                input.dataset.index = i;
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAnswer();
                });
                inputContainer.appendChild(input);
            });

            setTimeout(() => {
                const firstInput = inputContainer.querySelector('input');
                if (firstInput) firstInput.focus();
                speak(sentence);
            }, 500);
        }

        // CHUẨN HÓA CHUỖI ĐỂ SO SÁNH
        function normalizeText(text) {
            return text
                .toLowerCase()
                .replace(/[’‘`´]/g, "'") // Đưa tất cả các loại dấu nháy về dấu nháy thẳng chuẩn
                .replace(/[.,!?;:]/g, '') // Loại bỏ dấu câu
                .trim();
        }

        function checkAnswer() {
            const inputs = Array.from(document.querySelectorAll('#input-container input'));
            const userAnswer = inputs.map(i => i.value.trim()).join(' ');
            const correctAnswer = shuffledQuestions[currentIndex];
            
            const feedback = document.getElementById('feedback');
            const container = document.getElementById('quiz-content');

            if (normalizeText(userAnswer) === normalizeText(correctAnswer)) {
                totalCorrect++;
                feedback.innerText = praiseList[Math.floor(Math.random() * praiseList.length)];
                feedback.className = 'h-8 text-lg font-semibold mb-4 opacity-100 text-emerald-600';
                container.classList.add('correct-anim');
                speak(feedback.innerText, 1.0);
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
                inputs.forEach(i => i.disabled = true);
            } else {
                attempts++;
                totalWrong++;
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
                
                speak("Try again", 1.0);
                feedback.innerText = "Not quite right. Try again!";
                feedback.className = 'h-8 text-lg font-semibold mb-4 opacity-100 text-rose-500';

                if (attempts >= 3) {
                    showAnswer();
                } else {
                    inputs.forEach(i => {
                        i.value = '';
                        i.classList.add('border-rose-300');
                    });
                    inputs[0].focus();
                }
            }
        }

        function showAnswer() {
            const reveal = document.getElementById('answer-reveal');
            const correctText = document.getElementById('correct-answer-text');
            correctText.innerText = shuffledQuestions[currentIndex];
            reveal.classList.remove('hidden');
            document.getElementById('btn-check').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            speak("Let's look at the answer", 0.9);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < sentences.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('progress-bar').parentElement.parentElement.classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-correct').innerText = totalCorrect;
            document.getElementById('final-wrong').innerText = totalWrong;
            speak("Well done! You have completed the quiz.", 0.9);
        }

        document.getElementById('btn-listen').addEventListener('click', () => {
            speak(shuffledQuestions[currentIndex]);
        });
        document.getElementById('btn-check').addEventListener('click', checkAnswer);
        document.getElementById('btn-next').addEventListener('click', nextQuestion);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('btn-check').classList.contains('hidden')) {
                    checkAnswer();
                } else if (!document.getElementById('btn-next').classList.contains('hidden')) {
                    nextQuestion();
                }
            }
        });

        window.onload = initGame;
    </script>
</body>
</html>
