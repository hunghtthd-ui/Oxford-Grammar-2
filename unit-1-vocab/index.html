<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Plural Nouns Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f8;
        }

        .card {
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .feedback-animation {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl p-6 md:p-10 card">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Plural Nouns Challenge</h1>
            <p class="text-gray-500 mt-2">Write the plural form of the word below</p>
            <div id="progress" class="mt-4 text-sm font-semibold text-blue-600 uppercase tracking-wider"></div>
        </div>

        <!-- Main Game Area -->
        <div id="game-container">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <!-- Singular Column -->
                <div class="flex flex-col items-center p-6 bg-blue-50 rounded-2xl border-2 border-blue-100">
                    <span class="text-xs font-bold text-blue-400 uppercase mb-2">Singular</span>
                    <div id="singular-word" class="text-2xl md:text-4xl font-bold text-gray-700">---</div>
                    <button onclick="speakWord()" class="mt-4 p-2 bg-white rounded-full shadow-sm hover:shadow-md transition-all text-blue-500" title="Listen again">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                </div>

                <!-- Plural Column -->
                <div class="flex flex-col items-center p-6 bg-green-50 rounded-2xl border-2 border-green-100">
                    <span class="text-xs font-bold text-green-400 uppercase mb-2">Plural</span>
                    <input type="text" id="answer-input" autocomplete="off" class="w-full text-center text-xl md:text-2xl font-bold text-gray-700 bg-white border-2 border-gray-200 rounded-xl py-2 px-4 transition-all" placeholder="...">
                    <div id="attempts-left" class="mt-2 text-[10px] text-gray-400 font-bold uppercase"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col items-center space-y-4">
                <button id="check-btn" onclick="checkAnswer()" class="w-full md:w-1/2 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">
                    Check Answer
                </button>
                <div id="feedback-msg" class="h-8 font-bold text-lg text-center"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full md:w-1/2 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-2xl shadow-lg transition-all">
                    Next Question &rarr;
                </button>
                <div id="answer-reveal" class="hidden text-orange-600 font-bold bg-orange-50 px-4 py-2 rounded-lg border border-orange-200"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-container" class="hidden text-center py-10">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-gray-800">Completed!</h2>
            <div class="mt-6 space-y-2">
                <p class="text-xl">Correct: <span id="final-correct" class="font-bold text-green-600">0</span></p>
                <p class="text-xl">Incorrect: <span id="final-wrong" class="font-bold text-red-600">0</span></p>
            </div>
            <button onclick="startGame()" class="mt-10 px-8 py-4 bg-gray-800 text-white font-bold rounded-2xl hover:bg-gray-900 transition-all">
                Try Again
            </button>
        </div>
    </div>

    <script>
        // Full vocabulary from the images provided
        const vocabulary = [
            // Irregulars (Image 1)
            { s: "man", p: "men" },
            { s: "woman", p: "women" },
            { s: "child", p: "children" },
            { s: "person", p: "people" },
            { s: "foot", p: "feet" },
            { s: "tooth", p: "teeth" },
            { s: "sheep", p: "sheep" },
            { s: "fish", p: "fish" },
            { s: "mouse", p: "mice" },
            // Rules (Image 2)
            { s: "baby", p: "babies" },
            { s: "leaf", p: "leaves" },
            { s: "bus", p: "buses" },
            { s: "box", p: "boxes" },
            { s: "city", p: "cities" },
            { s: "knife", p: "knives" },
            { s: "potato", p: "potatoes" },
            { s: "tree", p: "trees" },
            { s: "watch", p: "watches" },
            { s: "dress", p: "dresses" },
            { s: "kite", p: "kites" },
            { s: "party", p: "parties" },
            { s: "tomato", p: "tomatoes" },
            { s: "scarf", p: "scarves" },
            { s: "story", p: "stories" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let attempts = 0;
        const praiseList = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        
        const inputField = document.getElementById('answer-input');

        // Initial setup
        window.onload = startGame;

        // Enter key support
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('next-btn').classList.contains('hidden')) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        function startGame() {
            // Shuffle and pick 20 random words
            currentQuestions = [...vocabulary].sort(() => Math.random() - 0.5).slice(0, 20);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            
            document.getElementById('game-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            const current = currentQuestions[currentIndex];
            attempts = 0;
            
            document.getElementById('singular-word').innerText = current.s;
            document.getElementById('progress').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            document.getElementById('attempts-left').innerText = "3 attempts left";
            
            inputField.value = "";
            inputField.disabled = false;
            inputField.classList.remove('border-red-500', 'border-green-500');
            inputField.focus();
            
            document.getElementById('feedback-msg').innerText = "";
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('answer-reveal').classList.add('hidden');

            // Speak word on start
            setTimeout(() => speakWord(), 500);
        }

        function speakWord(text) {
            const word = text || currentQuestions[currentIndex].s;
            const utterance = new SpeechSynthesisUtterance(word);
            
            // Try to find a clear female voice
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google UK English Female') || v.name.includes('Samantha'));
            
            if (femaleVoice) utterance.voice = femaleVoice;
            utterance.rate = 0.8; // Slow and clear
            utterance.pitch = 1.1;
            utterance.lang = 'en-US';
            
            window.speechSynthesis.speak(utterance);
        }

        function playSoundEffect(type) {
            // Use browser beep or synth if assets aren't available, but here we'll use speech for feedback
            const feedbackText = type === 'correct' ? praiseList[Math.floor(Math.random() * praiseList.length)] : "Try again";
            const utterance = new SpeechSynthesisUtterance(feedbackText);
            utterance.rate = 1;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        function checkAnswer() {
            const userAns = inputField.value.trim().toLowerCase();
            const correctAns = currentQuestions[currentIndex].p.toLowerCase();
            const feedback = document.getElementById('feedback-msg');

            if (userAns === correctAns) {
                // CORRECT
                correctCount++;
                const praise = praiseList[Math.floor(Math.random() * praiseList.length)];
                feedback.innerText = praise;
                feedback.className = "h-8 font-bold text-lg text-center text-green-600 feedback-animation";
                inputField.classList.add('border-green-500');
                inputField.disabled = true;
                
                playSoundEffect('correct');
                
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                // WRONG
                attempts++;
                wrongCount++;
                
                if (attempts >= 3) {
                    feedback.innerText = "Let's learn this one!";
                    feedback.className = "h-8 font-bold text-lg text-center text-orange-500";
                    
                    const reveal = document.getElementById('answer-reveal');
                    reveal.innerText = `Correct Answer: ${currentQuestions[currentIndex].p}`;
                    reveal.classList.remove('hidden');
                    
                    inputField.classList.add('border-orange-500');
                    inputField.disabled = true;
                    document.getElementById('check-btn').classList.add('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');
                } else {
                    feedback.innerText = "Try again!";
                    feedback.className = "h-8 font-bold text-lg text-center text-red-500";
                    inputField.classList.add('border-red-500');
                    document.getElementById('attempts-left').innerText = `${3 - attempts} attempts left`;
                    
                    playSoundEffect('wrong');
                    
                    // Shake effect
                    inputField.classList.add('animate-bounce');
                    setTimeout(() => {
                        inputField.classList.remove('animate-bounce', 'border-red-500');
                        inputField.value = "";
                    }, 800);
                }
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('final-correct').innerText = correctCount;
            document.getElementById('final-wrong').innerText = Math.max(0, (currentIndex * 1) - correctCount); // Simplified logic
            
            const utterance = new SpeechSynthesisUtterance("Congratulations! You have finished the practice.");
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
